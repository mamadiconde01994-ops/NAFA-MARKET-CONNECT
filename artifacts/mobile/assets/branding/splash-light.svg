<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 312" width="1440" height="312" role="img" aria-label="NAFA Splash Screen Light">
  <defs>
    <linearGradient id="splashBgLight" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#F6FFF8"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#splashBgLight)"/>
  
  <g transform="translate(720, 90)">
    <!-- Logo Mark -->
    <defs>
      <linearGradient id="markGrad1Light" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1a472a"/>
        <stop offset="100%" stop-color="#0d7c5f"/>
      </linearGradient>
      <linearGradient id="markGrad2Light" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#fdb913"/>
        <stop offset="100%" stop-color="#f59e0b"/>
      </linearGradient>
    </defs>
    
    <circle cx="0" cy="0" r="85" fill="url(#markGrad1Light)"/>
    <circle cx="-45" cy="-30" r="18" fill="url(#markGrad1Light)"/>
    <circle cx="45" cy="-30" r="18" fill="url(#markGrad2Light)"/>
    <circle cx="45" cy="30" r="18" fill="url(#markGrad1Light)"/>
    <circle cx="-45" cy="30" r="18" fill="url(#markGrad2Light)"/>
    <circle cx="0" cy="0" r="28" fill="#ffffff" opacity="0.85"/>
  </g>
  
  <text x="720" y="240" font-family="Segoe UI, Poppins, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#1a472a">NAFA</text>
  <text x="720" y="280" font-family="Segoe UI, Roboto, sans-serif" font-size="16" font-weight="400" text-anchor="middle" fill="#0d7c5f" letter-spacing="0.5">Marché Connect</text>
</svg>
