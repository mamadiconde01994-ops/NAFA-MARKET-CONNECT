  <text x="720" y="240" font-family="Segoe UI, Poppins, sans-serif" font-size="32" font-weight="700" text-anchor="middle" fill="#e8f5f1">NAFA</text>
  <text x="720" y="280" font-family="Segoe UI, Roboto, sans-serif" font-size="16" font-weight="400" text-anchor="middle" fill="#1da084" letter-spacing="0.5">Marché Connect</text>
