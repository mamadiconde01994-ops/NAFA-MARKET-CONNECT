<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 312" width="1440" height="312" role="img" aria-label="NAFA Splash Screen Dark">
  <defs>
    <linearGradient id="splashBgDark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1a14"/>
      <stop offset="100%" stop-color="#053633"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#splashBgDark)"/>
  
  <g transform="translate(720, 90)">
    <!-- Logo Mark -->
    <defs>
      <linearGradient id="markGrad1Dark" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1a472a"/>
