    <circle cx="0" cy="0" r="85" fill="url(#markGrad1Dark)"/>
    <circle cx="-45" cy="-30" r="18" fill="url(#markGrad1Dark)"/>
    <circle cx="45" cy="-30" r="18" fill="url(#markGrad2Dark)"/>
    <circle cx="45" cy="30" r="18" fill="url(#markGrad1Dark)"/>
