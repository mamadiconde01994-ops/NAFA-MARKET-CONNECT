<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="NAFA - App icon">
  <defs>
    <linearGradient id="appIconGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d7c5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appIconGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdb913;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="220" fill="url(#appIconGrad1)"/>

  <!-- Central mark -->
  <g transform="translate(512, 512)">
    <!-- Main hub -->
    <circle cx="0" cy="0" r="100" fill="#ffffff" opacity="0.95"/>
    
    <!-- Connecting elements -->
    <g stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.7">
      <line x1="0" y1="0" x2="-240" y2="-160"/>
      <line x1="0" y1="0" x2="240" y2="-160"/>
      <line x1="0" y1="0" x2="240" y2="160"/>
      <line x1="0" y1="0" x2="-240" y2="160"/>
    </g>

    <!-- Accent circles -->
    <g fill="url(#appIconGrad2)" opacity="0.85">
      <circle cx="-240" cy="-160" r="70"/>
      <circle cx="240" cy="-160" r="70"/>
      <circle cx="240" cy="160" r="70"/>
      <circle cx="-240" cy="160" r="70"/>
    </g>

    <!-- Inner ring accent -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="url(#appIconGrad2)" stroke-width="4" opacity="0.6"/>
  </g>
</svg>
