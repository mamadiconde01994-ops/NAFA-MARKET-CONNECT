<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="NAFA mark - Logo compact">
  <defs>
    <linearGradient id="markGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d7c5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="markGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdb913;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="markShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.12"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="600" height="600" rx="120" fill="#ffffff"/>

  <!-- Centered mark -->
  <g transform="translate(300, 300)">
    <!-- Central hub -->
    <circle cx="0" cy="0" r="50" fill="url(#markGrad1)" filter="url(#markShadow)"/>
    
    <!-- Quick connecting lines -->
    <g stroke="url(#markGrad1)" stroke-width="2.5" stroke-linecap="round" opacity="0.35">
      <line x1="0" y1="0" x2="-130" y2="-85"/>
      <line x1="0" y1="0" x2="130" y2="-85"/>
      <line x1="0" y1="0" x2="130" y2="85"/>
      <line x1="0" y1="0" x2="-130" y2="85"/>
    </g>

    <!-- Outer nodes (simplified for mark) -->
    <g fill="#ffffff" filter="url(#markShadow)">
      <circle cx="-130" cy="-85" r="32" fill="url(#markGrad1)"/>
      <circle cx="130" cy="-85" r="32" fill="url(#markGrad2)"/>
      <circle cx="130" cy="85" r="32" fill="url(#markGrad1)"/>
      <circle cx="-130" cy="85" r="32" fill="url(#markGrad2)"/>
    </g>

    <!-- Center accent -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#markGrad2)" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
