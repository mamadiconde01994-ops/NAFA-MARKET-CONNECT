<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 30" width="120" height="30" role="img" aria-label="Loading">
  <circle cx="15" cy="15" r="6" fill="#0B8A5F">
    <animate attributeName="r" from="6" to="6" begin="0s" dur="0.8s" values="6;10;6" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="1" dur="0.8s" values="1;.3;1" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="15" r="6" fill="#18B28A">
    <animate attributeName="r" from="6" to="6" begin="0.2s" dur="0.8s" values="6;10;6" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="1" begin="0.2s" dur="0.8s" values="1;.3;1" repeatCount="indefinite"/>
  </circle>
  <circle cx="105" cy="15" r="6" fill="#FFD166">
    <animate attributeName="r" from="6" to="6" begin="0.4s" dur="0.8s" values="6;10;6" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="1" to="1" begin="0.4s" dur="0.8s" values="1;.3;1" repeatCount="indefinite"/>
  </circle>
</svg>
